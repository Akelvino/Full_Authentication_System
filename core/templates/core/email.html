{% extends 'base.html' %}
{% block content %}

<div class="min-h-screen flex items-center justify-center bg-gray-100 px-4">
    <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg">
        <h1 class="text-3xl font-bold text-center mb-4 text-gray-800">Reset Your Password</h1>
        <p class="text-gray-600 text-center mb-6">
            Forgotten your password? Enter your email below, and we’ll send instructions for a new one.
        </p>

        <form action="{% url 'password_reset' %}" method="post" class="space-y-4">
            {% csrf_token %}

            <label for="email" class="block text-gray-700 font-semibold mb-1">
                Email Address
            </label>

            <input 
                type="email" 
                name="email" 
                id="email" 
                placeholder="Enter your email address"
                class="w-full px-4 py-3 border border-gray-300 rounded-md text-slate-900 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500"
                required
            >
            <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-2 rounded-lg hover:bg-indigo-700 transition-colors">
                Send Reset Link
            </button>
        </form>
        <div class="mt-6 text-center text-gray-500 text-sm">
            <a href="{% url 'login' %}" class="hover:text-indigo-600">Back to Login</a>
        </div>
    </div>
</div>

{% endblock content %}
